<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Vera — check the claim, not just the caption</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --page-bg:radial-gradient(125% 90% at 18% 0%, #ECE3FB 0%, #F1E9F8 32%, #F6F0EA 66%, #F9F4EF 100%);
    --app-bg:#FBF8F3;
    --surface:#FFFFFF;
    --surface-alt:#F4F0E9;
    --border:#ECE6DC;
    --border-strong:#DDD5C7;
    --text:#221D1A;
    --text-secondary:#6E645B;
    --text-muted:#A79D90;
    --brand:#6D45E0;
    --brand-dark:#5030BE;
    --brand-light:#F0EBFC;
    --ink:#1C1917;
    --ink-hover:#332E28;
    --accent:#6D45E0;
    --accent-on:#FFFFFF;
    --accent-text:#5030BE;
    --teal-bg:#E4F3EC;
    --teal-text:#0E6A53;
    --amber-bg:#FBEDD8;
    --amber-text:#8A5910;
    --red-bg:#FBE6E6;
    --red-text:#B23A3A;
    --gray-bg:#F0EBE1;
    --gray-text:#6E645B;
    --star:#DFA43A;
    --font-display:'Fraunces', Georgia, 'Times New Roman', serif;
    --font-body:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:var(--page-bg);
    background-attachment:fixed;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    letter-spacing:-0.01em;
  }
  .page{
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    justify-content:center;
    align-items:stretch;
  }
  .app-shell{
    width:100%;
    background:var(--app-bg);
    display:flex;
    flex-direction:column;
  }
  @media (min-width:461px){
    .page{align-items:flex-start; padding:40px 16px 56px;}
    .app-shell{
      width:390px;
      border-radius:46px;
      border:1px solid var(--border);
      box-shadow:0 0 0 10px #fff, 0 0 0 11px rgba(30,20,60,0.07),
                 0 2px 6px rgba(40,30,80,0.05), 0 34px 70px -22px rgba(70,45,150,0.30);
      overflow:hidden;
    }
  }
  .screen{
    display:none;flex-direction:column;gap:16px;flex:1;
    padding:max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right))
            max(32px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
  }
  .screen.active{display:flex;}
  #screen-home{background:linear-gradient(180deg, #EFE8FB 0%, #F5EEF6 120px, var(--app-bg) 300px);}
  .statusbar{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-secondary);}
  .statusbar b{color:var(--text);font-weight:600;}
  .nav{display:flex;justify-content:space-between;align-items:center;}
  .nav button.icon-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text);padding:4px;line-height:1;}
  .nav .title{font-family:var(--font-display);font-size:16.5px;font-weight:600;letter-spacing:-0.01em;}
  .brand-row{display:flex;align-items:flex-end;gap:6px;}
  .brand-dot{width:9px;height:9px;border-radius:50%;background:var(--brand);margin-bottom:9px;flex-shrink:0;}
  .wordmark{font-family:var(--font-display);font-size:32px;font-weight:600;letter-spacing:-0.015em;color:var(--brand-dark);line-height:1;}
  .tagline{font-family:var(--font-display);font-style:italic;font-size:15.5px;color:var(--text-secondary);margin-top:6px;letter-spacing:0;}
  .search-row{display:flex;gap:8px;}
  .search-row input{
    flex:1;border:1px solid var(--border-strong);background:var(--surface);
    border-radius:14px;padding:14px 16px;font-size:13.5px;color:var(--text);font-family:var(--font-body);
    outline:none;transition:border-color .15s ease, box-shadow .15s ease;
  }
  .search-row input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-light);}
  .search-row input::placeholder{color:var(--text-muted);}
  .input-tabs{display:flex;gap:4px;background:var(--surface-alt);padding:4px;border-radius:14px;border:1px solid var(--border);}
  .tab-btn{flex:1;border:none;background:none;padding:9px 4px;border-radius:10px;font-size:12.5px;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all .15s ease;font-family:var(--font-body);}
  .tab-btn.active{background:var(--surface);color:var(--brand-dark);box-shadow:0 1px 2px rgba(30,20,60,0.10);}
  .tab-panel{display:none;flex-direction:column;gap:10px;}
  .tab-panel.active{display:flex;}
  .upload-drop{border:1.5px dashed var(--border-strong);border-radius:14px;padding:20px 16px;
    display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;cursor:pointer;background:var(--surface);}
  .upload-drop input[type="file"]{display:none;}
  .upload-icon{font-size:22px;}
  .upload-hint{font-size:11.5px;color:var(--text-muted);}
  .upload-title{font-size:13px;font-weight:600;}
  .upload-preview{display:none;gap:10px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px;}
  .upload-preview.active{display:flex;}
  .upload-preview img{width:52px;height:52px;object-fit:cover;border-radius:10px;flex-shrink:0;}
  .upload-preview-meta{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .upload-preview-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .chip-row{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border-strong);background:var(--surface);border-radius:999px;
    padding:9px 15px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text);
    transition:all .15s ease;font-family:var(--font-body);}
  .chip svg{flex-shrink:0;}
  .chip:hover,.chip:active{background:var(--ink);border-color:var(--ink);color:#fff;}
  .btn-primary{
    background:var(--ink);color:#fff;border:none;border-radius:16px;
    padding:15px;font-size:14.5px;font-weight:600;cursor:pointer;width:100%;
    font-family:var(--font-body);letter-spacing:0.01em;
    transition:background .15s ease, transform .1s ease;
  }
  .btn-primary:hover{background:var(--ink-hover);}
  .btn-primary:active{transform:scale(0.985);}
  .btn-secondary{
    background:var(--surface);color:var(--text);border:1px solid var(--border-strong);border-radius:16px;
    padding:14px;font-size:14.5px;font-weight:600;cursor:pointer;width:100%;
    font-family:var(--font-body);transition:border-color .15s ease, transform .1s ease;
  }
  .btn-secondary:hover{border-color:var(--text-muted);}
  .btn-secondary:active{transform:scale(0.985);}
  .section-label{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--text);margin-top:4px;letter-spacing:-0.01em;}
  .example-card{
    background:var(--surface);border:1px solid var(--border);border-radius:18px;
    padding:13px;display:flex;gap:11px;align-items:center;cursor:pointer;text-align:left;
    box-shadow:0 1px 2px rgba(40,30,80,0.03);transition:border-color .15s ease, transform .1s ease;
  }
  .example-card:active{transform:scale(0.99);}
  .example-card:hover{border-color:var(--border-strong);}
  .example-thumb{
    width:52px;height:52px;border-radius:10px;background:var(--surface-alt);
    display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
  }
  .example-meta{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1;}
  .example-handle{font-size:12.5px;font-weight:600;}
  .example-caption{font-size:11.5px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px;display:flex;flex-direction:column;gap:11px;box-shadow:0 1px 2px rgba(40,30,80,0.03);}
  .row-between{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .pill{font-size:10.5px;font-weight:600;padding:4px 9px;border-radius:999px;white-space:nowrap;flex-shrink:0;}
  .pill-teal{background:var(--teal-bg);color:var(--teal-text);}
  .pill-amber{background:var(--amber-bg);color:var(--amber-text);}
  .pill-red{background:var(--red-bg);color:var(--red-text);}
  .pill-gray{background:var(--gray-bg);color:var(--gray-text);}
  .tag-row{display:flex;gap:6px;flex-wrap:wrap;}
  .thumb-box{position:relative;height:176px;border-radius:16px;overflow:hidden;
    background:linear-gradient(145deg,#6D45E0 0%,#8A66E6 44%,#CDBAF4 100%);
    display:flex;align-items:center;justify-content:center;}
  .thumb-play{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,0.94);
    display:flex;align-items:center;justify-content:center;color:var(--brand-dark);font-size:16px;padding-left:3px;
    box-shadow:0 8px 22px rgba(30,20,60,0.28);}
  .thumb-cap{position:absolute;left:12px;bottom:12px;background:rgba(20,15,40,0.5);color:#fff;
    font-size:11px;font-weight:600;padding:5px 11px;border-radius:999px;}
  .quote-box{background:var(--surface-alt);border-radius:12px;padding:12px 14px;font-size:13.5px;line-height:1.55;
    font-family:var(--font-display);font-style:italic;color:var(--text);}
  .tagged-product{display:flex;align-items:center;gap:12px;padding:2px 0;}
  .tagged-thumb{width:48px;height:48px;border-radius:12px;background:linear-gradient(160deg,#F1ECFB,#F8F2ED);
    border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
  .tagged-thumb svg{width:78%;height:78%;}
  .tagged-name{font-family:var(--font-display);font-size:17px;font-weight:600;letter-spacing:-0.01em;line-height:1.2;margin-top:1px;}
  .claim-row{display:flex;flex-direction:column;gap:4px;}
  .claim-top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .claim-title{font-size:12.5px;font-weight:600;}
  .claim-note{font-size:11.5px;color:var(--text-secondary);line-height:1.4;}
  .divider{height:1px;background:var(--border);}
  .link-out{font-size:12px;font-weight:700;color:var(--brand-dark);text-decoration:none;}
  .source-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .source-count{display:none;font-size:11px;color:var(--text-muted);}
  .source-count.show{display:inline;}
  .hscroll{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 6px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .hscroll::-webkit-scrollbar{display:none;}
  .hscroll-card{flex:0 0 auto;width:150px;background:var(--surface);border:1px solid var(--border);
    border-radius:16px;padding:10px;display:flex;flex-direction:column;gap:6px;cursor:pointer;text-align:left;
    box-shadow:0 1px 2px rgba(40,30,80,0.03);}
  .hscroll-card:hover{border-color:var(--border-strong);}
  .hscroll-thumb{width:100%;height:108px;border-radius:10px;background:var(--surface-alt);
    display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
  .hscroll-thumb svg{width:80%;height:80%;}
  .hscroll-brand{font-size:10px;font-weight:600;color:var(--text-secondary);}
  .hscroll-name{font-size:11.5px;font-weight:600;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:29px;}
  .hscroll-sub{font-size:10.5px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dsld-detail,.off-detail{margin-top:-4px;}
  .dsld-detail.card,.off-detail.card{gap:6px;border-top:none;border-top-left-radius:0;border-top-right-radius:0;}
  .product-img{height:236px;border-radius:22px;background:linear-gradient(160deg,#F1ECFB 0%,#F8F2ED 100%);
    border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .product-hero-art{width:176px;height:176px;filter:drop-shadow(0 14px 26px rgba(60,40,120,0.16));}
  .product-hero-art svg{width:100%;height:100%;}
  .brand-label{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--brand);}
  .product-name{font-family:var(--font-display);font-size:23px;font-weight:600;letter-spacing:-0.01em;line-height:1.15;}
  .price-row{font-size:13px;color:var(--text-secondary);}
  .rating-summary{display:flex;gap:20px;align-items:center;}
  .big-num{font-family:var(--font-display);font-size:32px;font-weight:600;line-height:1;}
  .stars{display:flex;gap:1px;}
  .star{font-size:12px;color:var(--star);}
  .star.off{color:var(--border-strong);}
  .bars{display:flex;flex-direction:column;gap:5px;flex:1;}
  .bar-row{display:flex;align-items:center;gap:8px;}
  .bar-row span{font-size:10.5px;color:var(--text-secondary);width:8px;}
  .bar-track{height:6px;border-radius:3px;background:var(--border);flex:1;overflow:hidden;}
  .bar-fill{height:100%;background:var(--star);}
  .review-card{display:flex;flex-direction:column;gap:8px;}
  .review-head{display:flex;gap:10px;align-items:center;}
  .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
  .review-name{font-size:12.5px;font-weight:600;}
  .review-body{font-size:12.5px;line-height:1.5;}
  .helpful{font-size:11px;color:var(--text-muted);}
  .list-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:2px 14px;display:flex;flex-direction:column;box-shadow:0 1px 2px rgba(40,30,80,0.03);}
  .list-row{display:flex;align-items:center;gap:10px;padding:10px 0;background:none;border:none;border-top:1px solid var(--border);width:100%;text-align:left;cursor:pointer;}
  .list-row:first-child{border-top:none;}
  .list-thumb{width:36px;height:36px;border-radius:9px;background:var(--surface-alt);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;position:relative;overflow:hidden;}
  .list-thumb img{width:100%;height:100%;object-fit:cover;border-radius:9px;}
  .list-thumb .thumb-fallback{display:none;position:absolute;inset:0;align-items:center;justify-content:center;background:var(--surface-alt);}
  .off-detail-photo{width:100%;max-height:160px;object-fit:cover;border-radius:12px;margin-bottom:2px;}

  .value-stats{display:flex;gap:10px;}
  .value-stat{flex:1;display:flex;flex-direction:column;gap:3px;}
  .value-stat-label{font-size:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--text-muted);}
  .value-stat-num{font-family:var(--font-display);font-size:20px;font-weight:600;}
  .value-stat-accent{color:var(--teal-text);}
  .value-verdict-row{display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--surface-alt);border-radius:12px;padding:11px 13px;font-size:12.5px;font-weight:600;}
  .evidence-stats{display:flex;gap:10px;}
  .evidence-stat{flex:1;background:var(--surface-alt);border-radius:12px;padding:10px 12px;display:flex;flex-direction:column;gap:3px;}
  .list-meta{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0;}
  .list-title{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .list-sub{font-size:11px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .list-chevron{color:var(--brand);font-size:14px;flex-shrink:0;font-weight:700;}
  .empty-state{font-size:12px;color:var(--text-muted);padding:14px 2px;text-align:center;}
  .score-banner{border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .score-banner-teal{background:var(--teal-bg);}
  .score-banner-amber{background:var(--amber-bg);}
  .score-banner-red{background:var(--red-bg);}
  .score-banner-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.03em;display:block;opacity:0.85;}
  .score-banner-value{font-family:var(--font-display);font-size:34px;font-weight:600;line-height:1;display:block;margin-top:3px;}
  .score-banner-tag{font-size:11px;font-weight:700;padding:5px 11px;border-radius:999px;background:rgba(255,255,255,0.65);white-space:nowrap;}
  .score-banner-teal .score-banner-label,.score-banner-teal .score-banner-value,.score-banner-teal .score-banner-tag{color:var(--teal-text);}
  .score-banner-amber .score-banner-label,.score-banner-amber .score-banner-value,.score-banner-amber .score-banner-tag{color:var(--amber-text);}
  .score-banner-red .score-banner-label,.score-banner-red .score-banner-value,.score-banner-red .score-banner-tag{color:var(--red-text);}
  .score-banner-gray{background:var(--gray-bg);}
  .score-banner-gray .score-banner-label,.score-banner-gray .score-banner-value,.score-banner-gray .score-banner-tag{color:var(--gray-text);}
  .unverified-photo{width:100%;max-height:220px;border-radius:12px;overflow:hidden;background:var(--surface-alt);border:1px solid var(--border);}
  .unverified-photo img{width:100%;height:100%;max-height:220px;object-fit:cover;display:block;}
  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--text);color:#fff;font-size:13px;padding:10px 18px;border-radius:999px;
    opacity:0;pointer-events:none;transition:opacity 0.2s ease, transform 0.2s ease;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="page">
<div class="app-shell">

  <!-- HOME -->
  <section class="screen active" id="screen-home">
    <div class="statusbar"><b>9:41</b><span>Wi-Fi 100%</span></div>
    <div>
      <div class="brand-row">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="wordmark">Vera</span>
      </div>
      <div class="tagline">The truth behind the hype.</div>
    </div>
    <div class="input-tabs">
      <button class="tab-btn active" data-tab="link" onclick="showInputTab('link')">Link</button>
      <button class="tab-btn" data-tab="screenshot" onclick="showInputTab('screenshot')">Image</button>
      <button class="tab-btn" data-tab="brand" onclick="showInputTab('brand')">Brand</button>
    </div>

    <div class="tab-panel active" id="tab-link">
      <div class="search-row">
        <input type="text" id="pasteInput" placeholder="Paste a TikTok or Instagram link…"
          onkeydown="if(event.key==='Enter'){checkPastedLink();}" />
      </div>
      <button class="btn-primary" onclick="checkPastedLink()">Check it</button>
      <span class="section-label" style="margin-top:6px;">Trending influencers</span>
      <div class="chip-row" id="sampleLinkChips"></div>
    </div>

    <div class="tab-panel" id="tab-screenshot">
      <label class="upload-drop" id="uploadDrop">
        <span class="upload-icon">🖼️</span>
        <span class="upload-title">Upload an image</span>
        <span class="upload-hint">A saved post, a caption, a product label — any image</span>
        <input type="file" accept="image/*" id="screenshotInput" onchange="handleScreenshot(this)" />
      </label>
      <div class="upload-preview" id="uploadPreview">
        <img id="uploadPreviewImg" alt="Uploaded image preview" />
        <div class="upload-preview-meta">
          <span class="upload-preview-name" id="uploadPreviewName"></span>
          <span class="helpful" id="ocrStatus">Ready to analyse</span>
        </div>
      </div>
      <button class="btn-primary" id="analyseBtn" onclick="analyseImage()" style="display:none;">Analyse product</button>

      <span class="section-label" style="margin-top:4px;">Or pick the product directly</span>
      <div class="chip-row" id="screenshotChips"></div>
    </div>

    <div class="tab-panel" id="tab-brand">
      <div class="search-row">
        <input type="text" id="brandInput" placeholder="Search by brand or product name…" oninput="filterBrands()" />
      </div>
      <div class="list-card" id="brandResults"></div>
      <div id="dsldResults"></div>
      <div id="offResults"></div>
    </div>

    <div class="section-label">Recently checked</div>
    <div class="hscroll" id="recentList"></div>

    <div class="section-label">Top scored by the community</div>
    <div class="hscroll" id="topScoredList"></div>

    <div class="section-label">Trending this week</div>
    <div id="exampleList" style="display:flex;flex-direction:column;gap:10px;"></div>
  </section>

  <!-- CHECK A POST -->
  <section class="screen" id="screen-check">
    <div class="statusbar"><b>9:41</b><span>Wi-Fi 100%</span></div>
    <div class="nav">
      <button class="icon-btn" onclick="goBack()" aria-label="Back">←</button>
      <span class="title">Check a product</span>
      <button class="icon-btn" aria-label="Share">↗</button>
    </div>

    <div class="card" id="postCard"></div>
    <div id="claimsBanner"></div>
    <div class="card" id="claimsCard"></div>

// Custom flat packaging illustration, not a real photo — several of these
// curated brand names could collide with real companies (e.g. "Wild

// photo isn't a risk worth taking for a demo. This is fast, on-brand, and
// scales to any new product without sourcing an image at all. Tinted by the
// product's evidence tier so the card signals it before you even read the pill.
function productArtSvg(p){
  const TONE = {
    teal: { body: '#CDEFE7', body2: '#9FDDC9' },
    amber: { body: '#FDECC7', body2: '#F8D488' },
    red: { body: '#FBD3D7', body2: '#F3AEB5' }
  };

  const shape = p.artShape || 'jar';
  let art;
  if (shape === 'bottle'){
    art = '<rect x="41" y="8" width="18" height="12" rx="3" fill="' + c.body2 + '"/>' +
          '<rect x="28" y="20" width="44" height="68" rx="12" fill="' + c.body + '"/>';
  } else if (shape === 'pouch'){
    art = '<rect x="33" y="10" width="34" height="12" rx="4" fill="' + c.body2 + '"/>' +
          '<rect x="20" y="20" width="60" height="68" rx="16" fill="' + c.body + '"/>';
  } else {
    art = '<rect x="30" y="12" width="40" height="10" rx="3" fill="' + c.body2 + '"/>' +
          '<rect x="18" y="20" width="64" height="66" rx="10" fill="' + c.body + '"/>';
  }
  return '<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="' + p.name + ' packaging illustration">' +
    art +
    '<text x="50" y="60" text-anchor="middle" font-size="28">' + p.emoji + '</text>' +

}

// "Evidence-adjusted" value tier: price alone doesn't tell you if something's
// a good deal — a cheap product with no evidence behind it still isn't worth
// buying, and a pricier one can be fair value if the evidence is strong.
// Rule (kept simple enough to say out loud): weak evidence (red) is always
// flagged Overpriced regardless of cost; moderate evidence (amber) is only
// Overpriced above £2/dose; strong evidence (teal) is Good value under
// £2/dose and still Fair value above it.
function valueTier(p, perDose){
  if (p.scoreTone === 'red') return { tier: 'Overpriced', tone: 'red' };
  if (p.scoreTone === 'amber') return perDose < 2 ? { tier: 'Fair value', tone: 'amber' } : { tier: 'Overpriced', tone: 'red' };
  return perDose < 2 ? { tier: 'Good value', tone: 'teal' } : { tier: 'Fair value', tone: 'amber' };
}

function valueAnalysisHtml(p){
  const perDose = p.priceValue / p.servings;
  const t = valueTier(p, perDose);
  return '<span class="section-label" style="margin:0;">💰 Value analysis</span>' +
    '<div class="value-stats">' +
      '<div class="value-stat"><span class="value-stat-label">Price</span><span class="value-stat-num">' + p.currency + p.priceValue.toFixed(2) + '</span></div>' +
      '<div class="value-stat"><span class="value-stat-label">Servings</span><span class="value-stat-num">' + p.servings + '</span></div>' +
      '<div class="value-stat"><span class="value-stat-label">Per dose</span><span class="value-stat-num value-stat-accent">' + p.currency + perDose.toFixed(2) + '</span></div>' +
    '</div>' +
    '<div class="value-verdict-row"><span>Evidence-adjusted rating</span>' + pill(t.tier, t.tone) + '</div>';
}

// ---- Live data helpers (OpenAlex + NIH DSLD) ----
// Both calls are wrapped with a timeout and fail silently: if the network,
// CORS, or rate limit misbehaves, the app falls back to the static curated
// content exactly as before. Nothing here is allowed to block or break the UI.

function fetchWithTimeout(url, ms){
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms || 6000);
  return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
}

function openAlexSearchUrl(query){
  return 'https://openalex.org/works?search=' + encodeURIComponent(query);
}

function sourceRowHtml(p, countId){
  return '<div class="source-row">' +
    '<a class="link-out" href="' + openAlexSearchUrl(p.sourceQuery) + '" target="_blank" rel="noopener">See sources on OpenAlex →</a>' +
    '<span class="source-count" id="' + countId + '"></span>' +
  '</div>';
}

async function loadStudyCount(product, targetId){
  const el = document.getElementById(targetId);
  if (!el || !product.sourceQuery) return;
  try {
    const url = 'https://api.openalex.org/works?search=' + encodeURIComponent(product.sourceQuery) + '&per-page=1';
    const res = await fetchWithTimeout(url, 6000);
    if (!res.ok) return;
    const data = await res.json();
    const count = data && data.meta && typeof data.meta.count === 'number' ? data.meta.count : null;
    if (count !== null && document.getElementById(targetId)){
      el.textContent = count.toLocaleString() + ' related studies on OpenAlex';
      el.classList.add('show');
    }
  } catch (e) {
    // silent — the link above still works, we just skip the live count
  }
}

// Small shared helper: real photo if we have one, emoji fallback if the
// image is missing OR fails to load (broken URL, hotlink block, etc).
function thumbHtml(imageUrl, fallbackEmoji){
  if (!imageUrl) return '<div class="list-thumb">' + fallbackEmoji + '</div>';
  return '<div class="list-thumb">' +
    '<img src="' + imageUrl + '" alt="" loading="lazy" onerror="imgFallback(this)" />' +
    '<span class="thumb-fallback">' + fallbackEmoji + '</span>' +
  '</div>';
}
function imgFallback(imgEl){
  imgEl.style.display = 'none';
  const fb = imgEl.nextElementSibling;
  if (fb) fb.style.display = 'flex';
}

async function fetchDsldResults(query){
  const url = 'https://dsldapi.od.nih.gov/v9/search-filter?q=' + encodeURIComponent(query) + '&size=4';
  const res = await fetchWithTimeout(url, 6000);
  if (!res.ok) throw new Error('DSLD request failed: ' + res.status);
  const data = await res.json();
  const hits = (data && data.hits) || [];
  return hits.map(h => {
    const s = h._source || {};
    return {
      id: h._id,
      name: s.fullName || s.productName || '',
      brand: s.brandName || '',
      // DSLD labels rarely have a thumbnail populated (it's a government
      // label-text database, not a photo library) — use it when present,
      // fall back to the flask icon otherwise.
      image: s.thumbnail || ''
    };
  }).filter(r => r.name);
}

// Open Food Facts is free, global, and crowd-sourced — unlike DSLD (US-only
// government data) it does carry non-US brands, so it's the fallback source
// for anything DSLD doesn't have (e.g. UK-market brands).
async function fetchOffResults(query){
  const url = 'https://world.openfoodfacts.org/cgi/search.pl?search_terms=' + encodeURIComponent(query) + '&json=1&page_size=4';
  const res = await fetchWithTimeout(url, 6000);
  if (!res.ok) throw new Error('Open Food Facts request failed: ' + res.status);
  const data = await res.json();
  const products = (data && data.products) || [];
  return products.map(p => ({
    code: p.code || '',
    name: p.product_name || p.generic_name || '',
    brand: p.brands || '',
    // OFF is crowd-photographed, so most listed products do have a real
    // front-of-pack photo — prefer the small variant (fast to load in a list row).
    image: p.image_front_small_url || p.image_front_url || p.image_url || ''
  })).filter(r => r.name && r.code);
}

// Open Food Facts' *search* endpoint rate-limits anonymous/automated
// traffic hard (confirmed live — repeated "Page temporarily unavailable"
// responses). Their direct by-barcode lookup doesn't have the same limit,
// so we keep a tiny pre-verified cache of real records (pulled straight
// from the live API, nothing invented) to fall back to if search fails —
// resilience for the demo, not fabricated data. Add more the same way:
// look the product up on openfoodfacts.org, copy its code/name/brand/image.
const OFF_FALLBACK_CACHE = [
  {
    match: ['nutrition geeks', 'collagen glow up'],
    result: {
      code: '5065017882037',
      name: 'Collagen Glow Up',
      brand: 'nutrition geeks',
      image: 'https://images.openfoodfacts.org/images/products/506/501/788/2037/front_en.7.400.jpg'
    }
  }
];
function offFallbackResults(query){
  const q = (query || '').toLowerCase();
  const hit = OFF_FALLBACK_CACHE.find(entry => entry.match.some(m => q.includes(m) || m.includes(q)));
  return hit ? [hit.result] : [];
}

function offResultsHtml(results){
  return '<div class="section-label" style="margin-top:2px;">From Open Food Facts (global, crowd-sourced)</div>' +
    '<div class="list-card">' + results.map(r =>
      '<button class="list-row" onclick="expandOffResult(\'' + r.code + '\', this)">' +
        thumbHtml(r.image, '🌍') +
        '<div class="list-meta"><span class="list-title">' + r.name + '</span><span class="list-sub">' + (r.brand || 'Unknown brand') + '</span></div>' +
        pill('Real data', 'gray') +
      '</button>'
    ).join('') + '</div>';
}

let offRequestToken = 0;
async function renderOffSection(query){
  const container = document.getElementById('offResults');
  if (!container) return;
  const trimmed = (query || '').trim();
  if (trimmed.length < 3){
    container.innerHTML = '';
    return;
  }
  const myToken = ++offRequestToken;
  container.innerHTML = '<div class="empty-state">Searching Open Food Facts…</div>';
  try {
    const results = await fetchOffResults(trimmed);
    if (myToken !== offRequestToken) return;
    if (!results.length){
      const fallback = offFallbackResults(trimmed);
      container.innerHTML = fallback.length ? offResultsHtml(fallback) : '';
      return;
    }
    container.innerHTML = offResultsHtml(results);
  } catch (e) {
    if (myToken !== offRequestToken) return;
    const fallback = offFallbackResults(trimmed);
    container.innerHTML = fallback.length ? offResultsHtml(fallback) : '';
  }
}

function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise(resolve => setTimeout(() => resolve(null), ms))
  ]);
}

// Real OCR, entirely client-side (Tesseract.js, WebAssembly). Returns null
// on any failure — missing library, bad image, timeout — never throws, so
// callers can always safely fall back to the manual "pick a product" chips.
async function runOcr(file){
  if (typeof Tesseract === 'undefined') return null;
  try {
    const worker = await Tesseract.createWorker('eng');
    const result = await worker.recognize(file);
    await worker.terminate();
    return (result && result.data && result.data.text) ? result.data.text : null;
  } catch (e) {
    return null;
  }
}

// Explicit user action (the "Analyse product" button) rather than firing on
// file select — gives people a moment to see what they uploaded before we
// run OCR + search on it.
async function analyseImage(){
  const file = document.getElementById('screenshotInput').files && document.getElementById('screenshotInput').files[0];
  if (!file){
    showToast('Upload an image first');
    return;
  }

  const analyseBtn = document.getElementById('analyseBtn');
  const ocrStatus = document.getElementById('ocrStatus');

  analyseBtn.disabled = true;
  analyseBtn.textContent = 'Analysing…';
  ocrStatus.textContent = 'Reading text from the image…';

  const text = await withTimeout(runOcr(file), 15000);
  analyseBtn.disabled = false;
  analyseBtn.textContent = 'Analyse product';

  if (text && text.trim().length > 2){
    const cleaned = text.trim().replace(/\s+/g, ' ').slice(0, 220);
    ocrStatus.textContent = 'Text found — searching…';
    searchOcrText(cleaned);
  } else {
    ocrStatus.textContent = 'No text recognised — pick a product directly below, or search by brand';
  }
}

function searchOcrText(raw){
  raw = (raw || '').trim();
  if (!raw){
    showToast('No readable text to search');
    return;
  }
  const matched = matchProduct(raw);
  if (matched){
    openCheck(matched);
    return;
  }
  // Not in the curated library — instead of guessing at a score we don't
  // have evidence for, show exactly what the image contained (including the
  // image itself) and offer real-database search as a separate, opt-in step.
  openUnverifiedCheck(raw, lastUploadedImageUrl);
  showToast("Not in our curated library — here's what your image showed");
}

function filterBrands(){
  const raw = document.getElementById('brandInput').value.trim();
  const q = raw.toLowerCase();
  const el = document.getElementById('brandResults');
  renderDsldSection(raw);
  renderOffSection(raw);

  if (!q){
    el.innerHTML = '<div class="empty-state">Start typing a brand or product name…</div>' + suggestionChipsHtml();
    return;
  }

  const words = q.split(/\s+/).filter(w => w.length >= 3);
  const ids = Object.keys(PRODUCTS).filter(id => {
    const p = PRODUCTS[id];
    const haystack = (p.brand + ' ' + p.name + ' ' + (p.keywords || []).join(' ')).toLowerCase();
    if (haystack.includes(q)) return true;
    return words.some(w => haystack.includes(w));
  });

  if (!ids.length){
    el.innerHTML = '<div class="empty-state">No matches for "' + raw + '" — try one of these instead:</div>' + suggestionChipsHtml();
    return;
  }

  el.innerHTML = ids.map(id => {
    const p = PRODUCTS[id];
    return '<button class="list-row" onclick="openProductDirect(\'' + id + '\')">' +
      '<div class="list-thumb">' + p.emoji + '</div>' +
      '<div class="list-meta"><span class="list-title">' + p.name + '</span><span class="list-sub">' + p.brand + '</span></div>' +
      pill(p.score + ' · ' + p.scoreLabel, p.scoreTone) +
      '<span class="list-chevron">›</span>' +
    '</button>';
  }).join('');
}

// A product OCR found but that we can't match against anything we actually
// evidence-check (curated library, DSLD, Open Food Facts). We still show
// real information — the exact image the user uploaded and the exact text
// we read from it — but we never invent a Claim Score for it. That's the
// line: real data or clearly-labelled "not yet checked", never a guess
// dressed up as a score.
function renderUnverifiedCheck(fullText, imageUrl){
  const cleaned = (fullText || '').trim();
  const lines = cleaned.split(/\n+/).map(l => l.trim()).filter(Boolean);
  // Best-effort guess at a headline only — OCR line order varies by image,
  // so this is never asserted as fact; the full text is always shown too.
  const headline = lines[0] || 'Unrecognised product';

  document.getElementById('postCard').innerHTML =
    (imageUrl ? '<div class="unverified-photo"><img src="' + imageUrl + '" alt="Uploaded product image" /></div>' : '') +
    '<span class="claim-title">' + headline + '</span>' +
    '<div class="tag-row">' + pill('From your image', 'gray') + pill('Not yet verified', 'gray') + '</div>';

  document.getElementById('claimsBanner').innerHTML =
    '<div class="score-banner score-banner-gray">' +
      '<div><span class="score-banner-label">Claim score</span><span class="score-banner-value">—</span></div>' +
      '<span class="score-banner-tag">Not yet evidence-checked</span>' +
    '</div>';

  document.getElementById('claimsCard').innerHTML =
    '<div class="claim-row">' +
      '<span class="claim-title">What we read from your image</span>' +
      '<span class="claim-note">' + (cleaned || 'No readable text found.') + '</span>' +
    '</div>' +
    '<span class="helpful">This isn\'t in our curated library, NIH DSLD, or Open Food Facts, so we can\'t score it against evidence yet — this is exactly what your image showed, unedited.</span>';

  document.getElementById('valueCard').innerHTML = '';
  document.getElementById('reviewCard').innerHTML = '<div class="empty-state">No reviews on file for this product yet.</div>';

  renderHigherScored('__unverified__');

  const cta = document.getElementById('checkCta');
  if (cta) cta.textContent = 'Search real databases for this →';
}

function openUnverifiedCheck(fullText, imageUrl){
  currentIsUnverified = true;

  renderUnverifiedCheck(fullText, imageUrl);

    '<div class="bar-row"><span>' + label + '</span><div class="bar-track"><div class="bar-fill" style="width:' + p.barPcts[i] + '%;"></div></div></div>'
  ).join('');

  document.getElementById('p-reviewCard').innerHTML = reviewHtml(p.review);
}

function show(screenId){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
  window.scrollTo(0, 0);
  if (screenId === 'screen-home'){
    renderRecent();
    renderTopScored();
  }
}

function openCheck(id){
  currentId = id;
  currentIsUnverified = false;
  renderCheck(id);
  pushRecent(id, 'check');
  screenStack.push('screen-check');
  show('screen-check');
}

function openProductDirect(id){
  currentId = id;
  currentIsUnverified = false;
  renderProduct(id);
  pushRecent(id, 'product');
  screenStack.push('screen-product');
  show('screen-product');
}

function detectPlatform(s){
  if (s.includes('tiktok.com')) return 'TikTok';
  if (s.includes('instagram.com') || s.includes('instagr.am')) return 'Instagram';
  if (s.includes('youtube.com') || s.includes('youtu.be')) return 'YouTube';
  return null;
}

function extractHandleFromUrl(s){
  let m = s.match(/tiktok\.com\/@([a-z0-9._]+)/i);
  if (m) return m[1].toLowerCase();
  m = s.match(/instagram\.com\/([a-z0-9._]+)/i);
  if (m) return m[1].toLowerCase();
  return null;
}

function matchProduct(input){
  const s = input.toLowerCase();
  const urlHandle = extractHandleFromUrl(s);
  const ids = Object.keys(PRODUCTS);
  for (const id of ids){
    const p = PRODUCTS[id];
    const handle = p.post.handle.replace('@', '').toLowerCase();
    if (urlHandle && urlHandle === handle) return id;
    const kws = [handle, id].concat(p.keywords || []);
    for (const kw of kws){
      if (kw && s.includes(kw.toLowerCase())) return id;
    }
  }
  return null;
}

function fillSampleLink(url){
  const input = document.getElementById('pasteInput');
  input.value = url;
  input.focus();
}

// Small monochrome platform glyphs (inherit the chip's text colour via
// currentColor, so they flip to white on hover). Keeps the influencer tags
// short — just the icon + handle instead of "TikTok · @handle".
function platformIcon(platform){
  const p = (platform || '').toLowerCase();
  if (p.indexOf('tiktok') !== -1){
    return '<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">' +
      '<path d="M16.5 3c.35 2.06 1.62 3.6 3.5 3.86v2.55c-1.3.13-2.53-.29-3.72-1.01v5.56c0 3.05-2.42 5.53-5.5 5.53S5.28 19.01 5.28 16 7.7 10.47 10.78 10.47c.3 0 .6.02.9.07v2.73c-.29-.09-.59-.14-.9-.14-1.57 0-2.84 1.29-2.84 2.9s1.27 2.9 2.84 2.9 2.9-1.29 2.9-2.9V3h2.82z"/></svg>';
  }
  if (p.indexOf('instagram') !== -1){
    return '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.9" aria-hidden="true">' +
      '<rect x="3" y="3" width="18" height="18" rx="5.2"/><circle cx="12" cy="12" r="4.2"/>' +
      '<circle cx="17.4" cy="6.6" r="1.1" fill="currentColor" stroke="none"/></svg>';
  }
  return '';
}

function renderSampleLinks(){
  const el = document.getElementById('sampleLinkChips');
  if (!el) return;
  el.innerHTML = SAMPLE_LINKS.map(s => {
    const p = PRODUCTS[s.id];
    const platform = p ? p.post.platform : '';
    const handle = p ? p.post.handle : s.label;
    return '<button class="chip" onclick="fillSampleLink(\'' + s.url + '\')">' +
      platformIcon(platform) + '<span>' + handle + '</span>' +
    '</button>';
  }).join('');
}

function checkPastedLink(){
  const raw = document.getElementById('pasteInput').value.trim();
  if (!raw){
    showToast('Paste a link, or try an example below');
    return;
  }
  const matched = matchProduct(raw);
  if (matched){
    openCheck(matched);
    return;
  }
  const plat = detectPlatform(raw.toLowerCase());
  showToast(plat
    ? "That " + plat + " link isn't in our evidence library yet — try an example below"
    : "Not in our evidence library yet — try an example below");
  const examples = document.getElementById('exampleList');
  if (examples && examples.scrollIntoView) examples.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function openProductFromCheck(){
  renderProduct(currentId);
  pushRecent(currentId, 'product');
  screenStack.push('screen-product');
  show('screen-product');
}

function goBack(){
  if (screenStack.length > 1) screenStack.pop();
  show(screenStack[screenStack.length - 1]);
}

let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// Make the horizontal card rails (.hscroll) scroll horizontally with a mouse
// too. On a phone they already swipe natively; on desktop a vertical wheel
// won't move them, so we translate wheel + click-drag into horizontal scroll.
// Listeners live on the container, so re-rendering the cards' innerHTML keeps
// them working. Touch is left to native scrolling (mouse pointers only).
function enableHScroll(){
  document.querySelectorAll('.hscroll').forEach(el => {
    if (el.dataset.hscrollBound) return;
    el.dataset.hscrollBound = '1';

    el.addEventListener('wheel', function(e){
      if (el.scrollWidth <= el.clientWidth) return;
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)){
        el.scrollLeft += e.deltaY;
        e.preventDefault();
      }
    }, { passive: false });

    let down = false, startX = 0, startLeft = 0, moved = false;
    el.addEventListener('pointerdown', function(e){
      if (e.pointerType !== 'mouse') return;
      down = true; moved = false; startX = e.clientX; startLeft = el.scrollLeft;
    });
    el.addEventListener('pointermove', function(e){
      if (!down) return;
      const dx = e.clientX - startX;
      if (Math.abs(dx) > 4) moved = true;
      el.scrollLeft = startLeft - dx;
    });
    const end = function(){ down = false; };
    el.addEventListener('pointerup', end);
    el.addEventListener('pointerleave', end);
    // Swallow the click that ends a drag so it doesn't open a card.
    el.addEventListener('click', function(e){
      if (moved){ e.preventDefault(); e.stopPropagation(); moved = false; }
    }, true);
  });
}

renderExamples();
renderRecent();
renderTopScored();
filterBrands();
renderSampleLinks();
enableHScroll();
</script>
